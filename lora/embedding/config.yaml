# 콩당콩당 LoRA 임베딩 파인튜닝 설정 파일
model:
  base_model_name_or_path: "BAAI/bge-m3"
  peft_type: "LORA"
  task_type: "FEATURE_EXTRACTION"

training:
  learning_rate: 3e-5
  num_train_epochs: 5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  fp16: true

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - "query"
    - "value"
    - "key"
    - "dense"
