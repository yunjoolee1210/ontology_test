# 콩당콩당 LoRA 리랭커(Reranker) 파인튜닝 설정 파일
model:
  base_model_name_or_path: "BAAI/bge-reranker-large"
  peft_type: "LORA"
  task_type: "SEQ_CLS"

training:
  learning_rate: 5e-5
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.1
  weight_decay: 0.01
  logging_steps: 5
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  fp16: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "query"
    - "value"
    - "key"
    - "dense"
