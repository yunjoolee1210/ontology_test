# CareKidney 풀스택 배포 블루프린트 (Render)
# 사용법: Render Dashboard > New > Blueprint > carekidney 레포(dev 브랜치) 연결
# 자세한 절차는 DEPLOY.md 참고. sync:false 환경변수는 대시보드에서 직접 입력.
services:
  # ── 백엔드 (FastAPI, Docker) ──────────────────────────────
  - type: web
    name: carekidney-backend
    runtime: docker
    repo: https://github.com/yunjoolee1210/carekidney.git
    branch: dev
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    plan: starter            # sentence-transformers/torch 때문에 >512MB RAM 필요
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: MONGODB_URI       # MongoDB Atlas SRV URI
        sync: false
      - key: PUBMED_EMAIL
        sync: false
      - key: PUBMED_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS   # 프론트 배포 URL (예: https://carekidney-frontend.onrender.com)
        sync: false
      # Redis 세션을 쓸 경우 주석 해제 (아래 redis 서비스도 함께)
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: carekidney-redis
      #     property: connectionString

  # ── 프론트엔드 (React + Vite, 정적) ───────────────────────
  - type: web
    name: carekidney-frontend
    runtime: static
    repo: https://github.com/yunjoolee1210/carekidney.git
    branch: dev
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL  # 백엔드 배포 URL (예: https://carekidney-backend.onrender.com)
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── (옵션) Redis: 세션 매니저에서 사용 시 주석 해제 ──────────
