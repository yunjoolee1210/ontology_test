# =============================================================================
# CareGuide Redis Configuration
# 멀티에이전트 AI 챗봇 세션 관리용 Redis 설정
# =============================================================================

# -----------------------------------------------------------------------------
# 네트워크 설정
# -----------------------------------------------------------------------------
# 바인딩 주소 (개발환경: localhost, 운영환경: 0.0.0.0 + 방화벽)
bind 127.0.0.1
port 6379

# TCP 백로그 (동시 연결 대기열)
tcp-backlog 511

# 클라이언트 타임아웃 (0 = 비활성화, 초 단위)
timeout 0

# TCP keepalive (초 단위, 0 = 비활성화)
tcp-keepalive 300

# -----------------------------------------------------------------------------
# 일반 설정
# -----------------------------------------------------------------------------
# 데몬 모드 (systemd 사용 시 no)
daemonize no

# PID 파일 위치
pidfile /var/run/redis_6379.pid

# 로그 레벨 (debug, verbose, notice, warning)
loglevel notice

# 로그 파일 (빈 문자열 = stdout)
logfile ""

# 데이터베이스 개수 (기본 16개, 0-15)
databases 16

# -----------------------------------------------------------------------------
# 메모리 관리 (CareGuide 세션용 최적화)
# -----------------------------------------------------------------------------
# 최대 메모리 (개발환경: 256MB, 운영환경: 시스템에 맞게 조정)
maxmemory 256mb

# 메모리 정책 (세션 데이터에 적합한 정책)
# allkeys-lru: 모든 키에서 LRU 알고리즘으로 삭제
# volatile-lru: TTL 설정된 키에서만 LRU 삭제 (권장)
# volatile-ttl: TTL이 짧은 키부터 삭제
maxmemory-policy volatile-lru

# LRU 샘플 수 (정확도, 5가 적당)
maxmemory-samples 5

# -----------------------------------------------------------------------------
# 영속성 설정 (RDB 스냅샷)
# -----------------------------------------------------------------------------
# RDB 스냅샷 저장 조건 (초, 변경 키 수)
# 900초(15분) 동안 1개 이상 변경 시 저장
# 300초(5분) 동안 10개 이상 변경 시 저장
# 60초(1분) 동안 10000개 이상 변경 시 저장
save 900 1
save 300 10
save 60 10000

# RDB 저장 실패 시 쓰기 중단 여부
stop-writes-on-bgsave-error yes

# RDB 파일 압축
rdbcompression yes

# RDB 체크섬
rdbchecksum yes

# RDB 파일명
dbfilename dump.rdb

# RDB 디렉토리 (절대 경로 권장)
dir ./

# -----------------------------------------------------------------------------
# AOF (Append Only File) 설정
# 세션 데이터는 손실 허용 가능하므로 기본 비활성화
# 중요 데이터 저장 시 활성화 권장
# -----------------------------------------------------------------------------
appendonly no

# AOF 파일명
appendfilename "appendonly.aof"

# AOF 동기화 정책
# always: 매 쓰기마다 (안전하지만 느림)
# everysec: 1초마다 (권장)
# no: OS에 맡김 (빠르지만 위험)
appendfsync everysec

# 재작성 중 fsync 비활성화
no-appendfsync-on-rewrite no

# AOF 자동 재작성 조건
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# -----------------------------------------------------------------------------
# 클라이언트 설정
# -----------------------------------------------------------------------------
# 최대 클라이언트 연결 수
maxclients 1000

# -----------------------------------------------------------------------------
# Lua 스크립트 설정
# -----------------------------------------------------------------------------
# Lua 스크립트 최대 실행 시간 (밀리초)
lua-time-limit 5000

# -----------------------------------------------------------------------------
# 느린 로그 설정 (디버깅용)
# -----------------------------------------------------------------------------
# 느린 쿼리 기준 시간 (마이크로초, 10000 = 10ms)
slowlog-log-slower-than 10000

# 느린 로그 최대 개수
slowlog-max-len 128

# -----------------------------------------------------------------------------
# 지연 시간 모니터링 설정
# -----------------------------------------------------------------------------
latency-monitor-threshold 0

# -----------------------------------------------------------------------------
# 이벤트 알림 설정 (키 만료 이벤트 등)
# Ex: 키 만료 이벤트 활성화 (세션 만료 감지용)
# -----------------------------------------------------------------------------
notify-keyspace-events Ex

# -----------------------------------------------------------------------------
# 고급 설정
# -----------------------------------------------------------------------------
# Hash 인코딩 최적화
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List 인코딩 최적화
list-max-ziplist-size -2
list-compress-depth 0

# Set 인코딩 최적화
set-max-intset-entries 512

# Sorted Set 인코딩 최적화
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog 희소 표현 최대 바이트
hll-sparse-max-bytes 3000

# 활성 재해싱 (CPU 부하 vs 메모리 효율)
activerehashing yes

# 클라이언트 출력 버퍼 제한
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 백그라운드 작업 Hz (10이 기본, 높을수록 CPU 사용 증가)
hz 10

# 동적 Hz 활성화
dynamic-hz yes

# AOF 재작성 시 증분 fsync
aof-rewrite-incremental-fsync yes

# RDB 저장 시 증분 fsync
rdb-save-incremental-fsync yes

# =============================================================================
# 보안 설정 (운영환경에서 반드시 설정)
# =============================================================================
# 비밀번호 설정 (운영환경에서 강력한 비밀번호 사용)
# requirepass your_strong_password_here

# 위험한 명령어 비활성화/이름 변경 (운영환경)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG ""
