name: Kongdang Chatbot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify build & compilation
      run: npm run build
      env:
        # 빌드 타임에 체크가 필요한 환경변수를 더미값으로 매핑
        OPENAI_API_KEY: "dummy_key"
        PINECONE_API_KEY: "dummy_key"
        NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy_key"
        PUBMED_API_KEY: "dummy_key"
        NEXTAUTH_SECRET: "dummy_secret"
        NEXTAUTH_URL: "http://localhost:3000"
